<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background shape -->
  <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#grad1)" filter="url(#shadow)"/>
  <!-- Inner accent -->
  <rect x="35" y="35" width="130" height="130" rx="30" fill="url(#grad2)" opacity="0.3"/>
  <!-- Person icon - head -->
  <circle cx="100" cy="72" r="22" fill="white"/>
  <!-- Person icon - body -->
  <path d="M60 135 C60 108 80 95 100 95 C120 95 140 108 140 135" fill="white"/>
  <!-- Accent dots -->
  <circle cx="145" cy="55" r="8" fill="white" opacity="0.4"/>
  <circle cx="55" cy="55" r="5" fill="white" opacity="0.3"/>
</svg>
